services:
  # Backend (Spring Boot)
  backend:
    build:
      context: ./matmatgotgot_back
      dockerfile: Dockerfile
    container_name: matgot-backend
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      # DB (AWS RDS MySQL)
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      # Email (Gmail SMTP)
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Google OAuth2
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}

      # Naver (kgy)
      NAVER_CLIENT_ID_K: ${NAVER_CLIENT_ID_K}
      NAVER_CLIENT_SECRET_K: ${NAVER_CLIENT_SECRET_K}

      # Naver API
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_SECRET: ${NAVER_SECRET}

      # Clova OCR
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY}
      CLOVA_OCR_API_URL: ${CLOVA_OCR_API_URL}

      # AWS S3
      CLOUD_AWS_CREDENTIALS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      CLOUD_AWS_CREDENTIALS_SECRET_KEY: ${AWS_SECRET_KEY}
      CLOUD_AWS_REGION_STATIC: ap-northeast-2
      CLOUD_AWS_S3_BUCKET: ${S3_BUCKET}

      # 파일 업로드 임시 경로 (Linux 컨테이너용)
      FILE_ROOT: /tmp/uploads/web/matgot/

    networks:
      - matgot-net

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./matmatgotgot_front
      dockerfile: Dockerfile
      args:
        VITE_BACKSERVER: ${VITE_BACKSERVER}
        VITE_NAVER_MAP_KEY: ${VITE_NAVER_MAP_KEY}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_KAKAO_JAVASCRIPT_KEY: ${VITE_KAKAO_JAVASCRIPT_KEY}
        VITE_KAKAO_REST_API_KEY: ${VITE_KAKAO_REST_API_KEY}
        VITE_KAKAO_REDIRECT_URI: ${VITE_KAKAO_REDIRECT_URI}
        VITE_KAKAO_CLIENT_SECRET: ${VITE_KAKAO_CLIENT_SECRET}
        VITE_NAVER_CLIENT_ID: ${VITE_NAVER_CLIENT_ID}
        VITE_NAVER_CLIENT_SECRET: ${VITE_NAVER_CLIENT_SECRET}
        VITE_IMG_SERVER: ${VITE_IMG_SERVER}
        VITE_TMAP_APP_KEY: ${VITE_TMAP_APP_KEY}
        VITE_ODSAY_API_KEY: ${VITE_ODSAY_API_KEY}
    container_name: matgot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - matgot-net

networks:
  matgot-net:
    driver: bridge
